<svg viewBox="0 0 260 72" xmlns="http://www.w3.org/2000/svg" fill="none">
  <defs>
    <linearGradient id="hg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="sg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="lg" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>

  <!-- Hexagon -->
  <polygon
    points="36,4 56,4 66,20 56,52 36,52 26,20"
    fill="#eef2ff"
    stroke="url(#hg)"
    stroke-width="2.2"
    stroke-linejoin="round"
  />

  <!-- Connector line -->
  <line x1="34" y1="42" x2="58" y2="14"
        stroke="url(#lg)" stroke-width="2.6" stroke-linecap="round"/>

  <!-- Bottom dot (dark blue) -->
  <circle cx="34" cy="42" r="6" fill="#1d4ed8"/>

  <!-- Top dot (cyan) -->
  <circle cx="58" cy="14" r="6" fill="#06b6d4"/>

  <!-- "Flow" -->
  <text x="82" y="36"
        font-family="'Segoe UI', 'Noto Sans', Arial, sans-serif"
        font-size="28" font-weight="800"
        fill="#1a2332">Flow</text>

  <!-- "Space" -->
  <text x="145" y="36"
        font-family="'Segoe UI', 'Noto Sans', Arial, sans-serif"
        font-size="28" font-weight="800"
        fill="url(#sg)">Space</text>

  <!-- "DEV ENVIRONMENT" -->
  <text x="83" y="52"
        font-family="'Segoe UI', 'Noto Sans', Arial, sans-serif"
        font-size="9.5" font-weight="500"
        fill="#94a3b8" letter-spacing="3.5">DEV ENVIRONMENT</text>
</svg>
