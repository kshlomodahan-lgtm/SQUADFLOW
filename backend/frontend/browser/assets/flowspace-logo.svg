<svg viewBox="0 0 282 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="hg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="sg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="lg" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>

  <!--
    Flat-top regular hexagon, center (48,40), circumradius 34
    Vertices: right(82,40) TR(65,11) TL(31,11) left(14,40) BL(31,69) BR(65,69)
    Corners softened with Q-bezier
  -->
  <path d="M 66.5,66.4
           L 80.5,42.6 Q 82,40 80.5,37.4
           L 66.5,13.6 Q 65,11 62,11
           L 34,11   Q 31,11 29.5,13.6
           L 15.5,37.4 Q 14,40 15.5,42.6
           L 29.5,66.4 Q 31,69 34,69
           L 62,69   Q 65,69 66.5,66.4 Z"
        fill="#eef4ff"
        stroke="url(#hg)"
        stroke-width="2.5"/>

  <!-- Connector curve bottom-left to top-right -->
  <path d="M 33,59 C 38,44 54,30 64,21"
        stroke="url(#lg)" stroke-width="2.8" stroke-linecap="round" fill="none"/>

  <!-- Bottom dot dark blue -->
  <circle cx="33" cy="59" r="6" fill="#1d4ed8"/>
  <!-- Top dot cyan -->
  <circle cx="64" cy="21" r="6" fill="#06b6d4"/>

  <!-- "Flow" dark navy + "Space" gradient, single text so no gap between words -->
  <text x="96" y="50"
        font-family="'Segoe UI', Arial, sans-serif"
        font-size="32" font-weight="800">
    <tspan fill="#1a2332">Flow</tspan><tspan fill="url(#sg)">Space</tspan>
  </text>

  <!-- Subtitle -->
  <text x="97" y="67"
        font-family="'Segoe UI', Arial, sans-serif"
        font-size="9" font-weight="400"
        fill="#94a3b8" letter-spacing="3.5">DEV ENVIRONMENT</text>
</svg>
